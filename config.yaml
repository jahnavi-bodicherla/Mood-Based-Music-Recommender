# ─────────────────────────────────────────────────────────────
# MoodTunes — Central Configuration
# ─────────────────────────────────────────────────────────────

app:
  name: "MoodTunes"
  version: "2.0.0"

# Ideal audio features per mood (used for hybrid scoring + Spotify seeds)
mood_profiles:
  happy:      { energy: 0.80, valence: 0.90, tempo: 120 }
  sad:        { energy: 0.20, valence: 0.20, tempo:  60 }
  energetic:  { energy: 0.95, valence: 0.70, tempo: 140 }
  relaxed:    { energy: 0.30, valence: 0.60, tempo:  70 }
  romantic:   { energy: 0.50, valence: 0.75, tempo:  90 }
  angry:      { energy: 0.90, valence: 0.30, tempo: 130 }
  chill:      { energy: 0.40, valence: 0.65, tempo:  80 }
  focus:      { energy: 0.30, valence: 0.50, tempo:  75 }
  party:      { energy: 0.95, valence: 0.90, tempo: 132 }
  devotional: { energy: 0.20, valence: 0.70, tempo:  65 }

# Spotify genre seeds per mood
spotify_seeds:
  happy:      ["pop", "dance", "happy"]
  sad:        ["sad", "acoustic", "piano"]
  energetic:  ["work-out", "metal", "rock"]
  relaxed:    ["chill", "ambient", "sleep"]
  romantic:   ["romance", "soul", "r-n-b"]
  angry:      ["metal", "hard-rock", "punk"]
  chill:      ["chill", "indie", "lo-fi"]
  focus:      ["classical", "study", "piano"]
  party:      ["party", "dance", "edm"]
  devotional: ["gospel", "new-age", "folk"]

# Hybrid scoring weights (must sum to 1.0)
scoring_weights:
  similarity:       0.30
  mood_match:       0.20
  language_match:   0.15
  age_match:        0.10
  popularity:       0.10
  user_feedback:    0.10
  profile_distance: 0.05

# Dynamic language boost
language_boost:
  threshold: 0.60
  amount:    0.05

# Security
security:
  password_min_length: 6
  max_login_attempts:  5
  lockout_seconds:     300
